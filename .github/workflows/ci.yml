name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Python syntax
        run: python -m compileall app main.py

      - name: Import app
        env:
          OPENAI_API_KEY: test-openai-key
          PINECONE_API_KEY: test-pinecone-key
          PINECONE_INDEX_NAME: test-index
          PINECONE_NAMESPACE: test-namespace
        run: python -c "import main; print(main.app.title)"

      - name: Build Docker image
        run: docker build -t matchatonic-ai-ci:${{ github.sha }} .

      - name: Run container smoke test
        env:
          OPENAI_API_KEY: test-openai-key
          PINECONE_API_KEY: test-pinecone-key
          PINECONE_INDEX_NAME: test-index
          PINECONE_NAMESPACE: test-namespace
        run: |
          docker run -d --name matchatonic-ai-ci \
            -e OPENAI_API_KEY \
            -e PINECONE_API_KEY \
            -e PINECONE_INDEX_NAME \
            -e PINECONE_NAMESPACE \
            -p 18000:8000 \
            matchatonic-ai-ci:${{ github.sha }}

          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:18000/ > /tmp/health.txt; then
              cat /tmp/health.txt
              exit 0
            fi
            sleep 2
          done

          echo "Smoke test failed"
          docker logs matchatonic-ai-ci
          exit 1

      - name: Cleanup smoke test container
        if: always()
        run: docker rm -f matchatonic-ai-ci || true
