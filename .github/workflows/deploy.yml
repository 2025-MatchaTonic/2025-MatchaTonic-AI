name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Git ref to deploy"
        required: false
        default: "main"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT || '22' }}
          script_stop: true
          script: |
            export DEPLOY_REF="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || 'main' }}"
            export APP_DIR="${{ secrets.EC2_APP_DIR }}"
            export IMAGE_NAME="matchatonic-ai"
            export CONTAINER_NAME="matchatonic-ai"
            export HOST_PORT="8000"
            export APP_PORT="8000"
            export HEALTHCHECK_URL="http://127.0.0.1:8000/"
            export BIND_ADDRESS="0.0.0.0"

            cd "$APP_DIR"
            bash scripts/deploy_ec2.sh
